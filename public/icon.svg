<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- UID Tech Gradient -->
    <linearGradient id="uidGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Premium Dark Slate Background with Apple-style rounded corners -->
  <rect width="200" height="200" rx="46" fill="#081120"/>
  
  <g transform="translate(35, 10)">
    <!-- "U" Bold in Pure White for Dark Mode contrast -->
    <text x="0" y="140"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="130"
          font-weight="800"
          fill="#FFFFFF">U</text>

    <!-- The Gradient Dot, mathematically aligned to baseline -->
    <circle cx="105" cy="124" r="16" fill="url(#uidGradient)"/>
  </g>
</svg>
