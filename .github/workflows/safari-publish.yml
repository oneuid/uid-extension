name: Build & Package Safari Extension

on:
  workflow_dispatch:
    inputs:
      should_sign:
        description: 'Sign and archive using Apple Certificates (requires secrets)'
        type: boolean
        required: false
        default: false

jobs:
  build-safari:
    runs-on: macos-latest
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Convert to Safari Web Extension
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcrun safari-web-extension-converter dist/chrome \
            --no-open \
            --swift \
            --force \
            --app-name "UID Link" \
            --bundle-identifier "one.uid.link"
          python3 -c "import os; path = 'UID Link/UID Link.xcodeproj/project.pbxproj'; data = open(path).read().replace('one.uid.UID-Link', 'one.uid.link'); open(path, 'w').write(data); print('Rewrote Bundle Identifier to one.uid.link')"
          python3 scripts/prepare-safari-project.py




      - name: Upload Unsigned Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uid-link-safari-xcode-project
          path: "UID Link/"

      # The following steps are run only if should_sign is true and secrets are configured
      - name: Import Apple Certificates
        if: ${{ github.event.inputs.should_sign == 'true' }}
        run: |

          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Signing certificates not found in secrets. Skipping signing step."
            exit 0
          fi
          if [ -z "$P12_PASSWORD" ]; then
            echo "P12_PASSWORD is empty (using passwordless certificate)."
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "Error: KEYCHAIN_PASSWORD secret is empty. Please set it in GitHub Secrets."
            exit 1
          fi

          
          # Create temporary keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          python3 -c "import base64, os; s = ''.join(os.environ.get('BUILD_CERTIFICATE_BASE64', '').split()); print('DEBUG clean length:', len(s)); s = s + 'A==' if len(s) == 4177 else (s[:-2] + 'A==' if len(s) == 4179 else s); open('$CERTIFICATE_PATH', 'wb').write(base64.b64decode(s))"






          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build and Archive with Xcode
        if: ${{ github.event.inputs.should_sign == 'true' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          # Build, sign and archive using xcodebuild as a Universal Binary
          xcodebuild -project "UID Link/UID Link.xcodeproj" \
            -scheme "UID Link (macOS)" \
            -configuration Release \
            -archivePath "build/UID Link.xcarchive" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            archive
            
      - name: Upload Archive Artifact
        if: ${{ github.event.inputs.should_sign == 'true' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: uid-link-safari-archive
          path: "build/UID Link.xcarchive"

      - name: Upload to App Store Connect
        if: ${{ github.event.inputs.should_sign == 'true' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [ -z "$API_KEY" ] || [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ]; then
            echo "App Store Connect credentials not found. Skipping App Store upload."
            exit 0
          fi

          # 1. Prepare private key for altool authentication
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8

          # 2. Detect the Installer certificate from the keychain
          INSTALLER_ID=$(security find-identity -v | grep "Developer Installer" | head -n 1 | sed -E 's/.*"[0-9a-fA-F]+"\s+"([^"]+)".*/\1/')
          if [ -z "$INSTALLER_ID" ]; then
            INSTALLER_ID=$(security find-identity -v | grep "Distribution" | head -n 1 | sed -E 's/.*"[0-9a-fA-F]+"\s+"([^"]+)".*/\1/')
          fi
          
          if [ -z "$INSTALLER_ID" ]; then
            echo "Error: No matching installer or distribution certificate found for signing the package."
            exit 1
          fi
          
          echo "Signing package with certificate: $INSTALLER_ID"

          # 3. Package the app as a signed installer PKG using productbuild (required for macOS App Store)
          productbuild --component "build/UID Link.xcarchive/Products/Applications/UID Link.app" /Applications "build/UID_Link.pkg" --sign "$INSTALLER_ID"

          # 4. Upload the signed PKG to App Store Connect
          xcrun altool --upload-app \
            --type osx \
            --file "build/UID_Link.pkg" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"


