name: Build & Package Safari Extension

on:
  workflow_dispatch:
    inputs:
      should_sign:
        description: 'Sign and archive using Apple Certificates (requires secrets)'
        type: boolean
        required: false
        default: false

jobs:
  build-safari:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Convert to Safari Web Extension
        run: |
          xcrun safari-web-extension-converter dist/chrome \
            --project-type universal \
            --no-open \
            --app-name "UID Link" \
            --bundle-identifier "one.uid.link"

      - name: Upload Unsigned Xcode Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uid-link-safari-xcode-project
          path: "UID Link/"

      # The following steps are run only if should_sign is true and secrets are configured
      - name: Import Apple Certificates
        if: ${{ github.event.inputs.should_sign == 'true' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Signing certificates not found in secrets. Skipping signing step."
            exit 0
          fi
          
          # Create temporary keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build and Archive with Xcode
        if: ${{ github.event.inputs.should_sign == 'true' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          # Build, sign and archive using xcodebuild
          xcodebuild -project "UID Link/UID Link.xcodeproj" \
            -scheme "UID Link (macOS)" \
            -configuration Release \
            -archivePath "build/UID Link.xcarchive" \
            archive
            
      - name: Upload Archive Artifact
        if: ${{ github.event.inputs.should_sign == 'true' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: uid-link-safari-archive
          path: "build/UID Link.xcarchive"
